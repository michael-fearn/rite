- name: Deploy Service
  hosts: "{{ deploy_service_backend_vm }}"
  gather_facts: false
  become: true
  tasks:
    - name: Validate Share-backed Volume subpaths
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ fortress_share_backed_volume_subpaths | default([]) }}"
      register: fortress_service_volume_subpath_stats

    - name: Refuse missing Share-backed Volume subpaths
      ansible.builtin.fail:
        msg: "Share-backed Volume subpath {{ item.item }} does not exist on Backend VM {{ deploy_service_backend_vm }}"
      loop: "{{ fortress_service_volume_subpath_stats.results | default([]) }}"
      when: not item.stat.exists

    - name: Ensure Podman is installed for Quadlet Services
      ansible.builtin.apt:
        name: podman
        state: present
        update_cache: true
      when: fortress_service_deploy_type == "quadlet"

    - name: Remove Service Secrets before replacement
      ansible.builtin.command:
        cmd: "podman secret rm {{ item.podman_name }}"
      loop: "{{ fortress_service_secrets | default([]) }}"
      failed_when: false
      no_log: true
      when: fortress_service_deploy_type == "quadlet"

    - name: Install Service Secrets as Podman secrets
      ansible.builtin.command:
        cmd: "podman secret create {{ item.podman_name }} -"
        stdin: "{{ lookup('pipe', 'sops --decrypt --extract ' ~ item.sops_extract | quote ~ ' ' ~ fortress_service_sops_file | quote) }}"
        stdin_add_newline: false
      loop: "{{ fortress_service_secrets | default([]) }}"
      no_log: true
      when: fortress_service_deploy_type == "quadlet"

    - name: Ensure Service Data Directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.uid | default(omit) }}"
        group: "{{ item.gid | default(omit) }}"
        mode: "0750"
      loop: "{{ fortress_service_data_directories | default([]) }}"
      when: fortress_service_deploy_type == "quadlet"

    - name: Ensure Quadlet system directory exists
      ansible.builtin.file:
        path: /etc/containers/systemd
        state: directory
        owner: root
        group: root
        mode: "0755"
      when: fortress_service_deploy_type == "quadlet"

    - name: Render selected Service Quadlet artifacts
      ansible.builtin.copy:
        dest: "{{ item.path }}"
        content: "{{ item.content }}"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ fortress_quadlet_artifacts }}"
      register: fortress_rendered_quadlets
      when: fortress_service_deploy_type == "quadlet"

    - name: Find obsolete fortress-rendered container Quadlets for selected Service
      ansible.builtin.find:
        paths: /etc/containers/systemd
        patterns: "fortress-{{ deploy_service }}-*.container"
        file_type: file
      register: fortress_service_container_quadlets
      when: fortress_service_deploy_type == "quadlet"

    - name: Prune obsolete fortress-rendered Quadlet units for selected Service
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ fortress_service_container_quadlets.files | default([]) }}"
      register: fortress_pruned_quadlets
      when:
        - fortress_service_deploy_type == "quadlet"
        - item.path not in fortress_owned_quadlet_prune_paths

    - name: List fortress-owned Podman secrets for selected Service
      ansible.builtin.shell: |
        set -eu
        podman secret ls --format '{{ "{{" }}.Name{{ "}}" }}' | awk '/^{{ fortress_service_secret_prefix }}/ { print }'
      args:
        executable: /bin/bash
      register: fortress_existing_service_secrets
      changed_when: false
      when: fortress_service_deploy_type == "quadlet"

    - name: Prune obsolete service-scoped Podman secrets
      ansible.builtin.command:
        cmd: "podman secret rm {{ item }}"
      loop: "{{ fortress_existing_service_secrets.stdout_lines | default([]) }}"
      when:
        - fortress_service_deploy_type == "quadlet"
        - item not in (fortress_service_secrets | default([]) | map(attribute='podman_name') | list)

    - name: Reload systemd after Quadlet changes
      ansible.builtin.systemd:
        daemon_reload: true
      when:
        - fortress_service_deploy_type == "quadlet"
        - fortress_rendered_quadlets.changed or fortress_pruned_quadlets.changed

    - name: Enable Service Quadlet units for boot
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
      loop: "{{ (fortress_service_network_units | default([])) + (fortress_service_start_units | default([])) }}"
      when: fortress_service_deploy_type == "quadlet"

    - name: Pull Service container images before systemd starts units
      ansible.builtin.command:
        cmd: "podman image pull {{ item }}"
      loop: "{{ fortress_service_container_images | default([]) }}"
      when: fortress_service_deploy_type == "quadlet"

    - name: Stop Service containers in reverse dependency order
      ansible.builtin.command:
        cmd: "systemctl stop {{ item }}"
      loop: "{{ fortress_service_stop_units | default([]) }}"
      failed_when: false
      changed_when: true
      when: fortress_service_deploy_type == "quadlet"

    - name: Start Service networks before containers
      ansible.builtin.command:
        cmd: "systemctl start {{ item }}"
      loop: "{{ fortress_service_network_units | default([]) }}"
      when: fortress_service_deploy_type == "quadlet"

    - name: Start Service containers in dependency order
      ansible.builtin.include_tasks: ../tasks/service-start-unit.yml
      loop: "{{ fortress_service_start_units | default([]) }}"
      when: fortress_service_deploy_type == "quadlet"

    - name: Ensure Native Service apt repository tooling is installed
      ansible.builtin.apt:
        name: gnupg
        state: present
        update_cache: true
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_apt_repo | default(none) is not none

    - name: Configure Native Service apt repository
      ansible.builtin.apt_repository:
        repo: "{{ fortress_native_apt_repo.repo | default('deb ' ~ fortress_native_apt_repo.url ~ ' any-version main') }}"
        filename: "{{ fortress_native_apt_repo.name }}"
        state: present
        update_cache: true
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_apt_repo | default(none) is not none

    - name: Install Native Service package
      ansible.builtin.apt:
        name: "{{ fortress_native_package }}"
        state: present
        update_cache: "{{ fortress_native_apt_repo | default(none) is none }}"
      when: fortress_service_deploy_type == "native"

    - name: List installed Caddy modules for Native Service package extensions
      ansible.builtin.command:
        cmd: caddy list-modules
      register: fortress_installed_caddy_modules
      changed_when: false
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_caddy_modules | default([]) | length > 0

    - name: Install missing Caddy module package extensions
      ansible.builtin.command:
        cmd: "caddy add-package {{ item.package }}"
      loop: "{{ fortress_native_caddy_modules | default([]) }}"
      register: fortress_caddy_module_installations
      when:
        - fortress_service_deploy_type == "native"
        - item.module not in fortress_installed_caddy_modules.stdout_lines

    - name: Refresh installed Caddy modules after package extension convergence
      ansible.builtin.command:
        cmd: caddy list-modules
      register: fortress_installed_caddy_modules
      changed_when: false
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_caddy_modules | default([]) | length > 0

    - name: Verify required Caddy modules are available
      ansible.builtin.fail:
        msg: "Required Caddy module {{ item.module }} is missing after package extension convergence"
      loop: "{{ fortress_native_caddy_modules | default([]) }}"
      when:
        - fortress_service_deploy_type == "native"
        - item.module not in fortress_installed_caddy_modules.stdout_lines

    - name: Extract Native Service Environment Secrets
      ansible.builtin.set_fact:
        fortress_native_environment_secrets: >-
          {{
            (fortress_native_environment_secrets | default({}))
            | combine({
                item.env: lookup('pipe', 'sops --decrypt --extract ' ~ item.sops_extract | quote ~ ' ' ~ fortress_service_sops_file | quote)
              })
          }}
      loop: "{{ fortress_native_environment_secret_specs | default([]) }}"
      no_log: true
      when: fortress_service_deploy_type == "native"

    - name: Ensure Native Service config parent directories exist
      ansible.builtin.file:
        path: "{{ item.dest | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ fortress_native_config_files | default([]) }}"
      when: fortress_service_deploy_type == "native"

    - name: Render Native Service config files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop: "{{ fortress_native_config_files | default([]) }}"
      register: fortress_native_rendered_config_files
      no_log: "{{ (fortress_native_environment_secret_specs | default([]) | length) > 0 }}"
      when: fortress_service_deploy_type == "native"

    - name: Reload systemd after Native Service unit drop-in changes
      ansible.builtin.systemd:
        daemon_reload: true
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_rendered_config_files.results | default([])
          | selectattr('changed')
          | selectattr('item.dest', 'match', '^/etc/systemd/system/')
          | list
          | length > 0

    - name: Record Native Service restart need
      ansible.builtin.set_fact:
        fortress_native_restart_needed: >-
          {{
            (fortress_caddy_module_installations.changed | default(false))
            or
            (
              fortress_native_rendered_config_files.results
              | default([])
              | selectattr('changed')
              | selectattr('item.action', 'equalto', 'restart')
              | list
              | length
            ) > 0
          }}
      when: fortress_service_deploy_type == "native"

    - name: Record Native Service reload need
      ansible.builtin.set_fact:
        fortress_native_reload_needed: >-
          {{
            (
              fortress_native_rendered_config_files.results
              | default([])
              | selectattr('changed')
              | selectattr('item.action', 'equalto', 'reload')
              | list
              | length
            ) > 0
          }}
      when: fortress_service_deploy_type == "native"

    - name: Restart Native Service after restart-marked config changes
      ansible.builtin.command:
        cmd: "systemctl restart {{ fortress_native_systemd_unit }}"
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_restart_needed | default(false) | bool

    - name: Reload Native Service after reload-only config changes
      ansible.builtin.command:
        cmd: "systemctl reload {{ fortress_native_systemd_unit }}"
      when:
        - fortress_service_deploy_type == "native"
        - fortress_native_reload_needed | default(false) | bool
        - not (fortress_native_restart_needed | default(false) | bool)

    - name: Ensure Native Service systemd unit is enabled and running
      ansible.builtin.systemd:
        name: "{{ fortress_native_systemd_unit }}"
        enabled: true
        state: started
      when: fortress_service_deploy_type == "native"
