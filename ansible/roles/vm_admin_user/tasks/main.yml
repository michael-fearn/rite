- name: Ensure VM admin user exists
  ansible.builtin.user:
    name: "{{ fortress_globals.vm_admin_user | default('admin') }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Ensure VM admin SSH directory exists
  ansible.builtin.file:
    path: "/home/{{ fortress_globals.vm_admin_user | default('admin') }}/.ssh"
    state: directory
    owner: "{{ fortress_globals.vm_admin_user | default('admin') }}"
    group: "{{ fortress_globals.vm_admin_user | default('admin') }}"
    mode: "0700"
  when: fortress_vm.ssh_public_key is defined

- name: Ensure VM admin SSH key is authorized
  ansible.builtin.lineinfile:
    path: "/home/{{ fortress_globals.vm_admin_user | default('admin') }}/.ssh/authorized_keys"
    line: "{{ fortress_vm.ssh_public_key }}"
    state: present
    create: true
    owner: "{{ fortress_globals.vm_admin_user | default('admin') }}"
    group: "{{ fortress_globals.vm_admin_user | default('admin') }}"
    mode: "0600"
  when: fortress_vm.ssh_public_key is defined

- name: Allow VM admin passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-fortress-{{ fortress_globals.vm_admin_user | default('admin') }}"
    owner: root
    group: root
    mode: "0440"
    content: "{{ fortress_globals.vm_admin_user | default('admin') }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: "visudo -cf %s"
