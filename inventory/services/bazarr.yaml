name: bazarr
hostname: bazarr.fearn.cloud
service_group: media
service_network: media
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: media-vm
  port: 6767
ingress:
  enabled: true
  exposure: lan_only
  tls: letsencrypt_dns
  auth:
    type: none
deploy:
  type: quadlet
  containers:
    - name: bazarr
      image: lscr.io/linuxserver/bazarr:v1.5.6-ls348
      published_ports:
        - bind: 0.0.0.0
          host: 6767
          container: 6767
          ingress: true
      env:
        PUID: 1001
        PGID: 1001
        TZ: UTC
      volumes:
        - service_path: config
          container: /config
          access: read_write
        - mount: media
          source: media
          container: /data/media
          access: read_write
