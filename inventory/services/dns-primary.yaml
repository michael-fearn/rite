name: dns-primary
service_group: dns-primary
service_data_owner:
  uid: 1000
  gid: 1000
backend:
  vm: dns-primary-vm
  port: 53
ingress:
  enabled: false
deploy:
  type: quadlet
  containers:
    - name: pihole
      image: docker.io/pihole/pihole:2025.05.0
      depends_on: [unbound]
      published_ports:
        - bind: 0.0.0.0
          host: 53
          container: 53
          protocol: tcp_udp
        - bind: 0.0.0.0
          host: 8080
          container: 80
      env:
        TZ: UTC
        FTLCONF_dns_upstreams: unbound#5335
      volumes:
        - service_path: pihole/etc-pihole
          container: /etc/pihole
          access: read_write
    - name: unbound
      image: docker.io/mvance/unbound:1.22.0
      volumes:
        - service_path: unbound
          container: /opt/unbound/etc/unbound
          access: read_write
