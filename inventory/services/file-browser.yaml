name: file-browser
hostname: files.fearn.cloud
service_data_owner:
  uid: 1000
  gid: 1000
backend:
  vm: file-browser-vm
  port: 8080
ingress:
  enabled: true
  exposure: lan_only
  tls: letsencrypt_dns
  auth:
    type: none
deploy:
  type: quadlet
  containers:
    - name: server
      image: docker.io/filebrowser/filebrowser:v2.32.0
      published_ports:
        - bind: 0.0.0.0
          host: 8080
          container: 80
          ingress: true
      volumes:
        - mount: personal-media
          source: /
          container: /srv
          access: read_write
        - service_path: database
          container: /database
          access: read_write
        - service_path: config
          container: /config
          access: read_write
