name: internal-ingress
backend:
  vm: internal-ingress-vm
  port: 443
ingress:
  enabled: false
deploy:
  type: native
  package: caddy
  apt_repo: caddy_official
  service_name: caddy
  config_files:
    - template: Caddyfile.j2
      dest: /etc/caddy/Caddyfile
      mode: "0644"
      reload_on_change: true
    - template: caddy.env.j2
      dest: /etc/default/caddy
      mode: "0644"
      restart_on_change: true
