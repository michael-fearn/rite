name: prowlarr
hostname: prowlarr.fearn.cloud
service_group: media
service_data_owner:
  uid: 1001
  gid: 1001
backend:
  vm: media-vm
  port: 9696
ingress:
  enabled: true
  exposure: lan_only
  tls: letsencrypt_dns
  auth:
    type: none
deploy:
  type: quadlet
  containers:
    - name: prowlarr
      image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls146
      published_ports:
        - bind: 0.0.0.0
          host: 9696
          container: 9696
          ingress: true
      env:
        PUID: 1001
        PGID: 1001
        TZ: UTC
      volumes:
        - service_path: config
          container: /config
          access: read_write
