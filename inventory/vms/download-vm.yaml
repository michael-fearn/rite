vmid: 1104
description: Apps VLAN downloader VM
placement:
  host: neuromancer
source:
  template: debian-13-base
hardware:
  cores: 2
  memory: 4096
  disks:
    - storage: local-lvm
      size: 32G
network:
  interfaces:
    - bridge: vmbr0
      vlan: 50
      address: 10.50.0.14/24
      gateway: 10.50.0.1
cloud_init:
  hostname: download-vm
mounts:
  - name: media
    dataset: media
    protocol: nfs
    mount_point: /mnt/nas/media
    access: read_write
backup:
  enabled: true
