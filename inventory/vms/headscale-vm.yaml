vmid: 1004
description: Infrastructure VLAN Headscale control-plane VM
placement:
  host: straylight
source:
  template: debian-13-base
hardware:
  cores: 1
  memory: 1024
  disks:
    - storage: local-lvm
      size: 16G
network:
  interfaces:
    - bridge: vmbr0
      vlan: 40
      address: 10.40.0.14/24
      gateway: 10.40.0.1
cloud_init:
  hostname: headscale-vm
backup:
  enabled: true
