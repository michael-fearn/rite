vmid: 1103
description: Apps VLAN media playback, request, catalog, and indexer VM
placement:
  host: neuromancer
source:
  template: debian-13-base
hardware:
  cores: 4
  memory: 8192
  disks:
    - storage: local-lvm
      size: 32G
network:
  interfaces:
    - bridge: vmbr0
      vlan: 50
      address: 10.50.0.13/24
      gateway: 10.50.0.1
cloud_init:
  hostname: media-vm
mounts:
  - name: media
    dataset: media
    protocol: nfs
    mount_point: /mnt/nas/media
    access: read_write
backup:
  enabled: true
