vmid: 1103
description: Apps VLAN media playback, request, catalog, and indexer VM
placement:
  host: neuromancer
source:
  template: debian-13-base
hardware:
  cores: 4
  memory: 8192
  disks:
    - storage: local-lvm
      size: 32G
network:
  interfaces:
    - bridge: vmbr0
      vlan: 50
      address: 10.50.0.13/24
      gateway: 10.50.0.1
cloud_init:
  hostname: media-vm
mounts:
  - name: media
    dataset: media
    protocol: nfs
    mount_point: /mnt/nas/media
    access: read_write
launchable_service_groups:
  - name: media
    launch_order:
      - prowlarr
      - sonarr
      - radarr
      - bazarr
      - jellyfin
      - seerr
backup:
  enabled: true
ssh_public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEu1qIgZagRPd76ypc9gavg2LeiwL7nHdMrUpaDmK1Ow fortress-vm-prepare:media-vm:2026-05-17T19:48:31Z
