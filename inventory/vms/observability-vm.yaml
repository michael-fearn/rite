vmid: 1007
description: Infrastructure VLAN observability VM
placement:
  host: straylight
source:
  template: debian-13-base
hardware:
  cores: 2
  memory: 4096
  disks:
    - storage: local-lvm
      size: 64G
network:
  interfaces:
    - bridge: vmbr0
      vlan: 40
      address: 10.40.0.17/24
      gateway: 10.40.0.1
cloud_init:
  hostname: observability-vm
backup:
  enabled: true
