name: immich
hostname: photos.fearn.cloud
service_group: media
service_data_owner:
  uid: 1000
  gid: 1000
backend:
  vm: media01
  port: 2283
ingress:
  enabled: true
  exposure: lan_only
  tls: letsencrypt_dns
  auth:
    type: none
deploy:
  type: quadlet
  containers:
    - name: server
      image: ghcr.io/immich-app/immich-server:v1.120.0
      published_ports:
        - host: 2283
          container: 2283
          protocol: tcp
          ingress: true
      volumes:
        - service_path: upload
          container: /usr/src/app/upload
          access: read_write
        - mount: media
          source: photos
          container: /photos
          access: read_only
      env:
        DB_HOSTNAME: immich-postgres
      secrets:
        - secret: secrets.db_password
          env: DB_PASSWORD_FILE
      depends_on: [postgres]
    - name: postgres
      image: postgres:16
