vmid: 101
description: web frontend
placement:
  host: wintermute
source:
  template: debian-12-base
hardware:
  cores: 2
  memory: 4096
  disks:
    - storage: local-lvm
      size: 32G
  pci_devices: []
network:
  interfaces:
    - bridge: vmbr0
      vlan: 10
      address: 10.0.10.101/24
      gateway: 10.0.10.1
cloud_init:
  hostname: web01
nfs_mounts:
  - export: media
    mount_point: /mnt/nas/media
    options_extra: [ro]
backup:
  enabled: true
  schedule: daily
  retention:
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 6
  datastore: main
ssh_public_key: ssh-ed25519 AAAA...
